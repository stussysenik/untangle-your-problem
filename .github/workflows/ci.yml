name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # npm (not pnpm): pnpm-workspace.yaml has no `packages` field, which breaks
      # pnpm in workspace mode. npm ignores it and installs from package.json.
      - name: Install
        run: npm install --no-audit --no-fund

      - name: Lint (oxlint)
        run: npm run lint

      - name: Typecheck (tsc)
        run: npm run typecheck

      - name: Build
        run: npm run build
