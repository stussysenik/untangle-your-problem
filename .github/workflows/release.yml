name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest
    # Skip the release bot's own commits.
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Private package → GitHub Releases + CHANGELOG only, no npm publish.
      # semantic-release and the changelog/git plugins are fetched on demand.
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          npx -y
          -p semantic-release@24
          -p @semantic-release/changelog@6
          -p @semantic-release/git@10
          semantic-release
