<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DESCRIBE YOUR PROBLEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              mono: ['"Courier New"', 'Courier', 'monospace'],
              sans: ['"Helvetica Neue"', 'Helvetica', 'Arial', 'sans-serif'],
              serif: ['"Times New Roman"', 'Times', 'serif'],
            },
            colors: {
              paper: '#ffffff',
              ink: '#000000',
              insight: '#CCFF00', // Vivid Neon Lime
            }
          },
        },
      }
    </script>
    <style>
      body {
        background-color: #ffffff;
        color: #000000;
        font-family: 'Helvetica Neue', sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      
      /* Precision Selection */
      ::selection {
        background: #CCFF00;
        color: #000000;
      }
      
      .bg-insight {
        background-color: #CCFF00;
        color: #000000;
      }

      /* Ultra-Minimal Scrollbar */
      .custom-scrollbar {
        scrollbar-width: thin;
        scrollbar-color: #e5e5e5 transparent;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background-color: #e5e5e5;
        border-radius: 0px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background-color: #000000;
      }

      /* Caret */
      .typewriter-caret {
        border-right: 2px solid black;
        animation: blink-caret 1s step-end infinite;
      }
      @keyframes blink-caret {
        from, to { border-color: transparent }
        50% { border-color: black; }
      }

      /* Print */
      @media print {
        @page { margin: 1cm; size: auto; }
        body { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        .no-print { display: none !important; }
        .print-only { display: block !important; }
        #root, .left-panel-container { height: auto !important; width: 100% !important; border: none !important; overflow: visible !important; }
        .right-panel-container { display: none !important; }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
  }
}
</script>

</head>

    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
